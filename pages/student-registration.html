<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Page</title>
</head>
<body>
    <div id="page-register" class="page">
        <h3>Student Registration</h3>
        <p class="sub">Fill in the details below to create your account.</p>
        <div class="form-group">
            <label>First Name <span class="req">*</span></label>
            <input type="text" id="firstName" placeholder="Trupti" />
            <span class="err-msg" id="err-firstName">Please enter your first name.</span>
          </div>
          <div class="form-group">
            <label>Last Name <span class="req">*</span></label>
            <input type="text" id="lastName" placeholder="Sharma" />
            <span class="err-msg" id="err-lastName">Please enter your last name.</span>
          </div>
          <div class="form-group">
            <label>Date of Birth <span class="req">*</span></label>
            <input type="date" id="dob" />
            <span class="err-msg" id="err-dob">Please select your date of birth.</span>
          </div>
          <div class="form-group">
            <label>Gender <span class="req">*</span></label>
            <select id="gender">
              <option value="">Select gender</option>
              <option>Male</option><option>Female</option><option>Other</option>
            </select>
            <span class="err-msg" id="err-gender">Please select your gender.</span>
          </div>
    </div>
</body>
</html>
